<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drift – Gentle Focus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f3f5f7;
      --card-bg: #ffffff;
      --accent: #4e8cff;
      --accent-soft: #e3edff;
      --accent-muted: #8ba3c7;
      --text-main: #1f2933;
      --text-soft: #6b7b93;
      --border-subtle: #d3dce6;
      --done: #3bb273;
      --drift: #f0b429;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.1);
      --radius-lg: 18px;
      --radius-full: 999px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #e5f0ff, var(--bg));
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 640px;
    }

    .card {
      background: linear-gradient(135deg, #fdfdff, #f6f8fb);
      border-radius: 32px;
      box-shadow: var(--shadow-soft);
      padding: 28px 24px 24px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      backdrop-filter: blur(16px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #0f172a;
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--text-soft);
    }

    .pill {
      padding: 6px 12px;
      border-radius: var(--radius-full);
      background: rgba(148, 163, 184, 0.1);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      border: 1px solid rgba(148, 163, 184, 0.3);
      white-space: nowrap;
    }

    .input-area {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 14px 14px 12px;
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .input-label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .input-label {
      font-size: 13px;
      color: var(--text-soft);
    }

    .input-hint {
      font-size: 11px;
      color: var(--accent-muted);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }

    #thoughtInput {
      flex: 1;
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      background: #f8fafc;
      color: var(--text-main);
      transition: border-color 0.15s ease, box-shadow 0.15s ease,
        background-color 0.15s ease;
    }

    #thoughtInput::placeholder {
      color: #9ca3af;
    }

    #thoughtInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(78, 140, 255, 0.4);
      background: #ffffff;
    }

    #addButton {
      border-radius: 999px;
      border: none;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: #f9fafb;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: transform 0.08s ease, box-shadow 0.08s ease,
        filter 0.08s ease;
    }

    #addButton:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.32);
    }

    #addButton:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .add-plus {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(248, 250, 252, 0.2);
      border: 1px solid rgba(248, 250, 252, 0.4);
      font-size: 13px;
    }

    .focus-area {
      margin-top: 4px;
      padding: 18px 16px 14px;
      background: radial-gradient(circle at top, #eff6ff, #f9fafb);
      border-radius: 22px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      position: relative;
      overflow: hidden;
    }

    .focus-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .focus-label {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6b7280;
    }

    .counter-pill {
      font-size: 11px;
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(148, 163, 184, 0.1);
      color: #4b5563;
    }

    .focus-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 16px 14px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      transition: background-color 0.4s ease, border-color 0.4s ease, opacity 0.35s ease;
    }

    .focus-card.feedback-done {
      background: #f0fdf4;
      border-color: rgba(34, 197, 94, 0.35);
    }

    .focus-card.feedback-drift {
      background: #eff6ff;
      border-color: rgba(59, 140, 255, 0.35);
    }

    .focus-card.feedback-out {
      opacity: 0;
    }

    .focus-card-content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .feedback-icon {
      display: none;
      flex-shrink: 0;
    }

    .focus-card.feedback-done .feedback-icon .wave-bar {
      display: none;
    }

    .focus-card.feedback-done .feedback-icon {
      display: block;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.2);
      border: 2px solid #22c55e;
      position: relative;
      animation: checkmark-in 0.45s ease-out forwards;
    }

    .focus-card.feedback-done .feedback-icon::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 4px;
      width: 8px;
      height: 14px;
      border: solid #22c55e;
      border-width: 0 2px 2px 0;
      transform: scale(0) rotate(45deg);
      transform-origin: center;
      animation: checkmark-draw 0.35s ease-out 0.2s forwards;
    }

    .focus-card.feedback-drift .feedback-icon {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 20px;
      animation: wave-in 0.5s ease-out forwards;
    }

    .focus-card.feedback-drift .feedback-icon .wave-bar {
      width: 4px;
      height: 12px;
      border-radius: 2px;
      background: rgba(59, 140, 255, 0.5);
      transform-origin: center;
      animation: wave-bob 1s ease-in-out infinite;
    }

    .focus-card.feedback-drift .feedback-icon .wave-bar:nth-child(1) { animation-delay: 0s; }
    .focus-card.feedback-drift .feedback-icon .wave-bar:nth-child(2) { animation-delay: 0.15s; }
    .focus-card.feedback-drift .feedback-icon .wave-bar:nth-child(3) { animation-delay: 0.3s; }
    .focus-card.feedback-drift .feedback-icon .wave-bar:nth-child(4) { animation-delay: 0.45s; }
    .focus-card.feedback-drift .feedback-icon .wave-bar:nth-child(5) { animation-delay: 0.6s; }

    @keyframes checkmark-in {
      from {
        opacity: 0;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes checkmark-draw {
      to {
        transform: scale(1) rotate(45deg);
      }
    }

    @keyframes wave-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes wave-bob {
      0%, 100% { transform: scaleY(0.6); }
      50% { transform: scaleY(1); }
    }

    .focus-text-main {
      font-size: 16px;
      line-height: 1.4;
      color: #0f172a;
      font-weight: 500;
    }

    .focus-card.feedback-done .focus-text-main,
    .focus-card.feedback-drift .focus-text-main {
      color: #475569;
      font-weight: 500;
    }

    .focus-text-empty {
      font-size: 14px;
      color: #9ca3af;
      font-style: italic;
    }

    .focus-badge {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6b7280;
      background: #f3f4f6;
      border-radius: 999px;
      padding: 3px 9px;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .control-btn {
      flex: 1;
      min-width: 110px;
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: #e5e7eb;
      color: #374151;
      transition: transform 0.08s ease, box-shadow 0.08s ease,
        background-color 0.08s ease, border-color 0.08s ease, filter 0.1s ease;
    }

    .control-btn span.icon {
      font-size: 14px;
    }

    #doneButton {
      background: #defce7;
      border-color: rgba(34, 197, 94, 0.4);
      color: #166534;
      box-shadow: 0 5px 16px rgba(34, 197, 94, 0.25);
    }

    #driftButton {
      background: #fef3c7;
      border-color: rgba(234, 179, 8, 0.4);
      color: #92400e;
      box-shadow: 0 5px 16px rgba(234, 179, 8, 0.23);
    }

    .control-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .control-btn:active {
      transform: translateY(0);
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.16);
    }

    .footer-row {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #9ca3af;
      gap: 8px;
      flex-wrap: wrap;
    }

    .footer-row-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.2);
    }

    .queue-count {
      font-weight: 500;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px 16px 18px;
        border-radius: 26px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="header">
        <div class="title-block">
          <div class="app-title">Drift</div>
          <div class="app-subtitle">
            One gentle thing at a time.
          </div>
        </div>
        <div class="pill">Calm focus · Beta</div>
      </div>

      <div class="input-area">
        <div class="input-label-row">
          <div class="input-label">Capture a thought or task</div>
          <div class="input-hint">Hit Enter or click Add</div>
        </div>
        <div class="input-row">
          <input
            id="thoughtInput"
            type="text"
            placeholder="Write the next small thing on your mind…"
            autocomplete="off"
          />
          <button id="addButton" type="button">
            <span class="add-plus">+</span>
            <span>Add</span>
          </button>
        </div>
      </div>

      <div class="focus-area">
        <div class="focus-header">
          <div class="focus-label">Now</div>
          <div class="counter-pill">
            <span id="positionLabel">0 / 0</span>
          </div>
        </div>
        <div class="focus-card" id="focusCard">
          <div class="focus-card-content">
            <div id="feedbackIcon" class="feedback-icon" aria-hidden="true">
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
            </div>
            <div id="currentItem" class="focus-text-empty">
              Nothing in your queue yet. Capture one gentle next step.
            </div>
          </div>
          <div id="focusBadge" class="focus-badge" style="display: none;">
            Next up
          </div>
        </div>

        <div class="controls">
          <button id="doneButton" class="control-btn" type="button" disabled>
            <span class="icon">✓</span>
            <span>Done</span>
          </button>
          <button id="driftButton" class="control-btn" type="button" disabled>
            <span class="icon">↺</span>
            <span>Drift</span>
          </button>
        </div>
      </div>

      <div class="footer-row">
        <div class="footer-row-left">
          <div class="dot"></div>
          <span>Drift is only showing you one thing.</span>
        </div>
        <div>
          <span class="queue-count" id="queueCount">0</span>
          in queue
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const thoughts = [];
      let currentIndex = -1;

      const input = document.getElementById("thoughtInput");
      const addButton = document.getElementById("addButton");
      const doneButton = document.getElementById("doneButton");
      const driftButton = document.getElementById("driftButton");
      const currentItemEl = document.getElementById("currentItem");
      const positionLabelEl = document.getElementById("positionLabel");
      const queueCountEl = document.getElementById("queueCount");
      const focusBadgeEl = document.getElementById("focusBadge");
      const focusCardEl = document.getElementById("focusCard");

      function updateUI() {
        const count = thoughts.length;
        queueCountEl.textContent = count.toString();

        if (count === 0) {
          currentIndex = -1;
          clearFeedback();
          currentItemEl.textContent =
            "Nothing in your queue yet. Capture one gentle next step.";
          currentItemEl.className = "focus-text-empty";
          positionLabelEl.textContent = "0 / 0";
          doneButton.disabled = true;
          driftButton.disabled = true;
          focusBadgeEl.style.display = "none";
          focusCardEl.style.opacity = "0.75";
          return;
        }

        if (currentIndex < 0 || currentIndex >= count) {
          currentIndex = 0;
        }

        const currentText = thoughts[currentIndex];

        currentItemEl.textContent = currentText;
        currentItemEl.className = "focus-text-main";
        positionLabelEl.textContent = currentIndex + 1 + " / " + count;
        doneButton.disabled = false;
        driftButton.disabled = false;
        focusBadgeEl.style.display = "inline-flex";
        focusCardEl.style.opacity = "1";

        focusCardEl.style.transform = "translateY(4px)";
        focusCardEl.style.transition = "transform 0.16s ease-out";
        requestAnimationFrame(() => {
          focusCardEl.style.transform = "translateY(0)";
        });
      }

      function addThought() {
        const value = input.value.trim();
        if (!value) return;

        thoughts.push(value);
        input.value = "";
        pickRandom();
      }

      const FEEDBACK_DURATION_MS = 1000;
      const FADE_OUT_MS = 350;

      function setFeedbackDone() {
        doneButton.disabled = true;
        driftButton.disabled = true;
        focusCardEl.classList.remove("feedback-drift");
        focusCardEl.classList.add("feedback-done");
        focusBadgeEl.style.display = "none";
        currentItemEl.textContent = "Nice one! 🎉";
        currentItemEl.className = "focus-text-main";
      }

      function setFeedbackDrift() {
        doneButton.disabled = true;
        driftButton.disabled = true;
        focusCardEl.classList.remove("feedback-done");
        focusCardEl.classList.add("feedback-drift");
        focusBadgeEl.style.display = "none";
        currentItemEl.textContent = "Let it drift 🌊";
        currentItemEl.className = "focus-text-main";
      }

      function clearFeedback() {
        focusCardEl.classList.remove("feedback-done", "feedback-drift", "feedback-out");
      }

      function removeCurrentAndAdvance() {
        if (currentIndex < 0 || currentIndex >= thoughts.length) {
          updateUI();
          return;
        }

        thoughts.splice(currentIndex, 1);

        if (thoughts.length === 0) {
          updateUI();
          return;
        }

        pickRandom();
      }

      function pickRandom() {
        const count = thoughts.length;
        if (count === 0) {
          currentIndex = -1;
          updateUI();
          return;
        }

        if (count === 1) {
          currentIndex = 0;
          updateUI();
          return;
        }

        let newIndex = currentIndex;
        const triesLimit = 5;
        let tries = 0;

        while (newIndex === currentIndex && tries < triesLimit) {
          newIndex = Math.floor(Math.random() * count);
          tries++;
        }

        if (newIndex === currentIndex) {
          newIndex = (currentIndex + 1) % count;
        }

        currentIndex = newIndex;
        updateUI();
      }

      addButton.addEventListener("click", addThought);

      input.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          addThought();
        }
      });

      doneButton.addEventListener("click", function () {
        if (thoughts.length === 0 || focusCardEl.classList.contains("feedback-done") || focusCardEl.classList.contains("feedback-drift")) return;
        setFeedbackDone();
        setTimeout(function () {
          focusCardEl.classList.add("feedback-out");
          setTimeout(function () {
            removeCurrentAndAdvance();
            clearFeedback();
            updateUI();
          }, FADE_OUT_MS);
        }, FEEDBACK_DURATION_MS);
      });

      driftButton.addEventListener("click", function () {
        if (thoughts.length === 0 || focusCardEl.classList.contains("feedback-done") || focusCardEl.classList.contains("feedback-drift")) return;
        setFeedbackDrift();
        setTimeout(function () {
          focusCardEl.classList.add("feedback-out");
          setTimeout(function () {
            pickRandom();
            clearFeedback();
            updateUI();
          }, FADE_OUT_MS);
        }, FEEDBACK_DURATION_MS);
      });

      input.focus();
      updateUI();
    })();
  </script>
</body>
</html>
