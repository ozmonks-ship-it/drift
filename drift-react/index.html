
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <script>
        (function () {
          var storageKey = 'solm.theme';
          var stored = localStorage.getItem(storageKey);
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = systemDark ? 'dark' : 'light';
          if (stored === 'light' || stored === 'dark') {
            resolved = stored;
          } else if (stored === 'system') {
            resolved = systemDark ? 'dark' : 'light';
          }
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
          document.documentElement.style.backgroundColor = resolved === 'dark' ? '#0c0c0c' : '#fafafa';
        })();
      </script>
      <link rel="manifest" href="/manifest.json">
      <meta name="theme-color" content="#fafafa">
      <meta name="mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black">
      <meta name="apple-mobile-web-app-title" content="solm">
      <meta name="description" content="A task app that picks one thing for you. One thing at a time." />
      <link rel="icon" href="/icon.svg" type="image/svg+xml">
      <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png">
      <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png">
      <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png">
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png">
      <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon-512.png">
      <script>
        window.__pwaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (event) => {
          event.preventDefault();
          window.__pwaInstallPrompt = event;
          window.dispatchEvent(new Event('pwa-install-available'));
        });
      </script>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>solm - the one thing</title>
      <style>html, body { height: 100%; margin: 0; background-color: var(--solm-bg, #fafafa); } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js');
          });
        }
      </script>
    </body>
  </html>
